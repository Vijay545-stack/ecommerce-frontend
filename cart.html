<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart - ShopEasy</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="brand">ShopEasy</a>
  <div class="nav-links" id="nav-links"></div>
</nav>

<div class="container">
  <h1 class="page-title">Your Cart</h1>
  <div id="cart-items"></div>
  <div id="cart-summary"></div>
</div>

<script src="js/main.js"></script>
<script>
function renderCart() {
  const cart = getCart();
  const itemsDiv = document.getElementById("cart-items");
  const summaryDiv = document.getElementById("cart-summary");

  if (cart.length === 0) {
    itemsDiv.innerHTML = `<p class="empty-state">Your cart is empty. <a href="index.html" style="color:var(--primary); font-weight:600;">Go shopping</a></p>`;
    summaryDiv.innerHTML = "";
    return;
  }

  itemsDiv.innerHTML = cart.map(item => `
    <div class="cart-item">
      <img src="${escapeHtml(item.imageUrl || '')}" alt="${escapeHtml(item.name)}" onerror="this.src='https://via.placeholder.com/64x64?text=No+Image'">
      <div class="details">
        <div><strong>${escapeHtml(item.name)}</strong></div>
        <div>${formatMoney(item.price)} each</div>
      </div>
      <div class="qty-control">
        <button onclick="changeQty('${item.productId}', ${item.quantity - 1})">-</button>
        <span>${item.quantity}</span>
        <button onclick="changeQty('${item.productId}', ${item.quantity + 1})">+</button>
      </div>
      <div><strong>${formatMoney(item.price * item.quantity)}</strong></div>
      <button class="btn btn-danger btn-sm" onclick="removeItem('${item.productId}')">Remove</button>
    </div>
  `).join("");

  summaryDiv.innerHTML = `
    <div class="cart-summary">
      <div class="row total">
        <span>Total</span>
        <span>${formatMoney(cartTotal())}</span>
      </div>
      <button class="btn btn-block" style="margin-top:14px;" onclick="goToCheckout()">Proceed to Checkout</button>
    </div>
  `;
}

function changeQty(productId, qty) {
  updateCartQuantity(productId, qty);
  renderCart();
}

function removeItem(productId) {
  removeFromCart(productId);
  renderCart();
}

function goToCheckout() {
  if (!isLoggedIn()) {
    window.location.href = "login.html";
    return;
  }
  window.location.href = "checkout.html";
}

renderCart();
</script>

</body>
</html>
