<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - ShopEasy</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="brand">ShopEasy</a>
  <div class="nav-links" id="nav-links"></div>
</nav>

<div class="form-card">
  <h2>Login</h2>
  <div id="form-message"></div>
  <form id="login-form">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" required>
    </div>
    <button type="submit" class="btn btn-block">Login</button>
  </form>
  <p class="muted-link">Don't have an account? <a href="register.html">Register here</a></p>
</div>

<script src="js/main.js"></script>
<script>
document.getElementById("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const msg = document.getElementById("form-message");
  msg.innerHTML = "";

  try {
    const data = await apiFetch("/auth/login", {
      method: "POST",
      body: JSON.stringify({ email, password })
    });
    saveAuth(data);
    window.location.href = "index.html";
  } catch (err) {
    msg.innerHTML = `<p class="form-error">${escapeHtml(err.message)}</p>`;
  }
});
</script>

</body>
</html>
