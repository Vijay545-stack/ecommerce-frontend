<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - ShopEasy</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="brand">ShopEasy</a>
  <div class="nav-links" id="nav-links"></div>
</nav>

<div class="container">
  <h1 class="page-title">Admin Panel</h1>

  <div class="tabs">
    <button class="active" id="tab-products" onclick="switchTab('products')">Products</button>
    <button id="tab-orders" onclick="switchTab('orders')">Orders</button>
  </div>

  <div id="products-tab">
    <button class="btn" style="margin-bottom: 16px;" onclick="openProductModal()">+ Add Product</button>
    <div id="products-table">Loading...</div>
  </div>

  <div id="orders-tab" class="hidden">
    <div id="orders-table">Loading...</div>
  </div>
</div>

<!-- Product Modal -->
<div id="product-modal" class="modal-overlay hidden">
  <div class="modal-box">
    <h2 id="modal-title">Add Product</h2>
    <div id="modal-message"></div>
    <form id="product-form">
      <input type="hidden" id="product-id">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="p-name" required>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="p-description" rows="3" required></textarea>
      </div>
      <div class="form-group">
        <label>Price ($)</label>
        <input type="number" id="p-price" min="0" step="0.01" required>
      </div>
      <div class="form-group">
        <label>Category</label>
        <input type="text" id="p-category" required>
      </div>
      <div class="form-group">
        <label>Stock Quantity</label>
        <input type="number" id="p-stock" min="0" required>
      </div>
      <div class="form-group">
        <label>Image URL (optional)</label>
        <input type="text" id="p-imageUrl" placeholder="https://...">
      </div>
      <div style="display:flex; gap:10px;">
        <button type="submit" class="btn btn-block">Save</button>
        <button type="button" class="btn btn-outline btn-block" onclick="closeProductModal()">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script src="js/main.js"></script>
<script>
requireAdmin();

function switchTab(tab) {
  document.getElementById("tab-products").classList.toggle("active", tab === "products");
  document.getElementById("tab-orders").classList.toggle("active", tab === "orders");
  document.getElementById("products-tab").classList.toggle("hidden", tab !== "products");
  document.getElementById("orders-tab").classList.toggle("hidden", tab !== "orders");
  if (tab === "orders") loadOrders();
}

// ===== PRODUCTS =====
async function loadProducts() {
  const container = document.getElementById("products-table");
  try {
    const products = await apiFetch("/products");

    if (products.length === 0) {
      container.innerHTML = `<p class="empty-state">No products yet. Add your first one.</p>`;
      return;
    }

    container.innerHTML = `
      <table>
        <thead><tr><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Actions</th></tr></thead>
        <tbody>
          ${products.map(p => `
            <tr>
              <td>${escapeHtml(p.name)}</td>
              <td>${escapeHtml(p.category)}</td>
              <td>${formatMoney(p.price)}</td>
              <td>${p.stock}</td>
              <td>
                <button class="btn btn-sm btn-outline" onclick='openProductModal(${JSON.stringify(p)})'>Edit</button>
                <button class="btn btn-sm btn-danger" onclick="deleteProduct('${p._id}')">Delete</button>
              </td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    `;
  } catch (err) {
    container.innerHTML = `<p class="form-error">${escapeHtml(err.message)}</p>`;
  }
}

function openProductModal(product = null) {
  document.getElementById("modal-message").innerHTML = "";
  document.getElementById("product-form").reset();

  if (product) {
    document.getElementById("modal-title").textContent = "Edit Product";
    document.getElementById("product-id").value = product._id;
    document.getElementById("p-name").value = product.name;
    document.getElementById("p-description").value = product.description;
    document.getElementById("p-price").value = product.price;
    document.getElementById("p-category").value = product.category;
    document.getElementById("p-stock").value = product.stock;
    document.getElementById("p-imageUrl").value = product.imageUrl || "";
  } else {
    document.getElementById("modal-title").textContent = "Add Product";
    document.getElementById("product-id").value = "";
  }

  document.getElementById("product-modal").classList.remove("hidden");
}

function closeProductModal() {
  document.getElementById("product-modal").classList.add("hidden");
}

document.getElementById("product-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const msg = document.getElementById("modal-message");
  msg.innerHTML = "";

  const id = document.getElementById("product-id").value;
  const payload = {
    name: document.getElementById("p-name").value,
    description: document.getElementById("p-description").value,
    price: parseFloat(document.getElementById("p-price").value),
    category: document.getElementById("p-category").value,
    stock: parseInt(document.getElementById("p-stock").value),
    imageUrl: document.getElementById("p-imageUrl").value || undefined
  };

  try {
    if (id) {
      await apiFetch(`/products/${id}`, { method: "PUT", body: JSON.stringify(payload) });
    } else {
      await apiFetch("/products", { method: "POST", body: JSON.stringify(payload) });
    }
    closeProductModal();
    loadProducts();
  } catch (err) {
    msg.innerHTML = `<p class="form-error">${escapeHtml(err.message)}</p>`;
  }
});

async function deleteProduct(id) {
  if (!confirm("Delete this product? This cannot be undone.")) return;
  try {
    await apiFetch(`/products/${id}`, { method: "DELETE" });
    loadProducts();
  } catch (err) {
    alert(err.message);
  }
}

// ===== ORDERS =====
async function loadOrders() {
  const container = document.getElementById("orders-table");
  try {
    const orders = await apiFetch("/orders");

    if (orders.length === 0) {
      container.innerHTML = `<p class="empty-state">No orders placed yet.</p>`;
      return;
    }

    const statuses = ["pending", "processing", "shipped", "delivered", "cancelled"];

    container.innerHTML = `
      <table>
        <thead><tr><th>Order ID</th><th>Customer</th><th>Total</th><th>Status</th><th>Date</th></tr></thead>
        <tbody>
          ${orders.map(o => `
            <tr>
              <td>#${o._id.slice(-6)}</td>
              <td>${escapeHtml(o.user ? o.user.name : "Unknown")}</td>
              <td>${formatMoney(o.totalAmount)}</td>
              <td>
                <select onchange="updateOrderStatus('${o._id}', this.value)">
                  ${statuses.map(s => `<option value="${s}" ${s === o.status ? "selected" : ""}>${s}</option>`).join("")}
                </select>
              </td>
              <td>${new Date(o.createdAt).toLocaleDateString()}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    `;
  } catch (err) {
    container.innerHTML = `<p class="form-error">${escapeHtml(err.message)}</p>`;
  }
}

async function updateOrderStatus(orderId, status) {
  try {
    await apiFetch(`/orders/${orderId}/status`, { method: "PUT", body: JSON.stringify({ status }) });
  } catch (err) {
    alert(err.message);
  }
}

loadProducts();
</script>

</body>
</html>
