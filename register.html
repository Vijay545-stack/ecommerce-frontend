<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - ShopEasy</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="brand">ShopEasy</a>
  <div class="nav-links" id="nav-links"></div>
</nav>

<div class="form-card">
  <h2>Create an Account</h2>
  <div id="form-message"></div>
  <form id="register-form">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" required>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" minlength="6" required>
    </div>
    <button type="submit" class="btn btn-block">Register</button>
  </form>
  <p class="muted-link">Already have an account? <a href="login.html">Login here</a></p>
</div>

<script src="js/main.js"></script>
<script>
document.getElementById("register-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const msg = document.getElementById("form-message");
  msg.innerHTML = "";

  try {
    const data = await apiFetch("/auth/register", {
      method: "POST",
      body: JSON.stringify({ name, email, password })
    });
    saveAuth(data);
    window.location.href = "index.html";
  } catch (err) {
    msg.innerHTML = `<p class="form-error">${escapeHtml(err.message)}</p>`;
  }
});
</script>

</body>
</html>
